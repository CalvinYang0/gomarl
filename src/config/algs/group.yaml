# --- QMIX specific parameters ---

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 100000

runner: "parallel"
run: "interval_run"
batch_size_run: 8
buffer_size: 5000 
batch_size: 128
optimizer: 'adam'

t_max: 10050000

# update the target network every {} episodes
target_update_interval: 200

# use the Q_Learner to train
mac: "group_mac"
agent: "n_group"
agent_output_type: q

learner: "group_learner"
mixer: "group"                     # group | group_vdn
mixing_embed_dim: 32
hypernet_embed: 32
grouping_hypernet_embed: 32
group_head_mode: "latent"         # latent | plain | fixed_group | struct_group
group_num: 3
group_assignment_tau: 1.0
group_balance_alpha: 0.01
group_conf_alpha: 0.001
group_sparse_alpha: 0.001

lr: 0.001                           # Learning rate for agents
td_lambda: 0.6
optimizer: 'adam'
group_mode: "dynamic"              # dynamic | one_group | singletons | same_type | manual
group: null                         # manual initial group, e.g. [[0,1],[2,3]]
group_adjustment_mode: "contribution"  # contribution | graph_pseudo_attn | graph_local_subgraph | graph_local_fusion
change_group_interval: 100000
change_group_batch_num: 4           # change group data 256*4
change_group_batch_size: 256
change_group_value: 0.7             # change group when w1 < average * change_group_value
graph_change_group_batch_num: 1
graph_change_group_batch_size: 32
graph_local_neighbor_topk: null     # null -> floor(n_agents/2) local neighbors per agent
graph_topk: null                    # null -> floor(n_agents/2)
graph_edge_threshold: 0.12
visualize_group_graph: False        # upload test-time group graph video/image to W&B
visualize_group_graph_max_frames: 24
visualize_group_graph_fps: 4

lasso_alpha_anneal_time: 100000
lasso_alpha_start: 0.005
lasso_alpha_anneal: 0.96
sd_alpha: 0.005

name: "group_env=8_adam_td_lambda"
